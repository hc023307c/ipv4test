<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>子網路計算小屋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=Zen+Maru+Gothic:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="sky"></div>
    <div class="hill hill-back"></div>
    <div class="hill hill-front"></div>

    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Subnet Calculator</p>
        <h1>子網路計算小屋</h1>
        <p class="hero-copy">
          輸入 IP 與首碼或子網路遮罩，幫你整理出完整網段資訊。
        </p>

        <form id="subnet-form" class="calculator-form" novalidate>
          <label class="field">
            <span>IP 位址</span>
            <input
              id="ip-input"
              name="ip"
              type="text"
              inputmode="decimal"
              placeholder="例如 192.168.1.10"
              autocomplete="off"
            />
          </label>

          <div class="field-row">
            <label class="field">
              <span>CIDR 首碼</span>
              <input
                id="prefix-input"
                name="prefix"
                type="text"
                inputmode="numeric"
                placeholder="例如 24 或 /24"
                autocomplete="off"
              />
            </label>

            <div class="or-divider" aria-hidden="true">或</div>

            <label class="field">
              <span>子網路遮罩</span>
              <input
                id="mask-input"
                name="mask"
                type="text"
                inputmode="decimal"
                placeholder="例如 255.255.255.0"
                autocomplete="off"
              />
            </label>
          </div>

          <div class="action-row">
            <button type="submit" class="primary-btn">開始計算</button>
            <button type="button" class="ghost-btn" id="fill-demo">帶入範例</button>
            <button type="reset" class="ghost-btn">清除</button>
          </div>

          <p class="helper-text">
            可擇一輸入 CIDR 首碼或子網路遮罩，若兩者都輸入，系統會檢查是否一致。
          </p>
          <p id="message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="result-card" aria-labelledby="result-title">
        <div class="result-header">
          <h2 id="result-title">網段資訊</h2>
          <p>計算結果會顯示在這裡</p>
        </div>

        <div class="result-grid">
          <article class="result-item">
            <span class="result-label">子網路遮罩</span>
            <strong id="result-mask">尚未計算</strong>
          </article>
          <article class="result-item">
            <span class="result-label">網段名稱</span>
            <strong id="result-network-name">尚未計算</strong>
          </article>
          <article class="result-item">
            <span class="result-label">廣播位址</span>
            <strong id="result-broadcast">尚未計算</strong>
          </article>
          <article class="result-item">
            <span class="result-label">IP 網段範圍</span>
            <strong id="result-network-range">尚未計算</strong>
          </article>
          <article class="result-item">
            <span class="result-label">可用 IP 範圍</span>
            <strong id="result-usable-range">尚未計算</strong>
          </article>
          <article class="result-item">
            <span class="result-label">可用主機數</span>
            <strong id="result-host-count">尚未計算</strong>
          </article>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
